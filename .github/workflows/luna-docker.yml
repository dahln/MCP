name: Build and Publish LUNA MCP Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'LUNA/Dev.MCP.LUNA/**'
      - 'LUNA/Ping.MCP.LUNA/**'
      - '.github/workflows/luna-docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push-ping:
    name: Build and Push Ping.MCP.LUNA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Ping.MCP.LUNA
        id: meta-ping
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ping-mcp-luna
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Ping.MCP.LUNA
        uses: docker/build-push-action@v5
        with:
          context: ./LUNA
          file: ./LUNA/Ping.MCP.LUNA/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-ping.outputs.tags }}
          labels: ${{ steps.meta-ping.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-dev:
    name: Build and Push Dev.MCP.LUNA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Dev.MCP.LUNA
        id: meta-dev
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dev-mcp-luna
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Dev.MCP.LUNA
        uses: docker/build-push-action@v5
        with:
          context: ./LUNA
          file: ./LUNA/Dev.MCP.LUNA/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-dev.outputs.tags }}
          labels: ${{ steps.meta-dev.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
