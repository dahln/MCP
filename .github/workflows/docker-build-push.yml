name: Build and Push Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "LUNA/**/Dockerfile"
      - "LUNA/docker-compose.yml"
  pull_request:
    branches:
      - master
    paths:
      - "LUNA/**/Dockerfile"
      - "LUNA/docker-compose.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: portal-luna
            dockerfile: Portal.LUNA/Dockerfile
          - name: ping-mcp-luna
            dockerfile: Ping.MCP.LUNA/Dockerfile
          - name: dev-mcp-luna
            dockerfile: Dev.MCP.LUNA/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./LUNA
          file: ./LUNA/${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
